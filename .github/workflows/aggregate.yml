name: aggregate

# Pulls every registered participant's registry into one content-addressed UNION and regenerates
# STATUS.md ("who has done what"). Because records are named by content hash, the merge is
# conflict-free by construction — git itself is the federation transport. The aggregator reruns
# nothing and trusts no participant's word: it mirrors their signed records and reports the facts.

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [aggregate]
  schedule:
    - cron: "*/30 * * * *"
  push:
    paths: ["participants.json"]

permissions:
  contents: write

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use the committed reference binaries (pure-Go, static)
        run: |
          chmod +x bin/plankton bin/nekton bin/kton
          echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Mirror each participant into the union
        env:
          PLANKTON_DIR: ${{ github.workspace }}/federation/plankton-data
          NEKTON_DIR: ${{ github.workspace }}/federation/nekton-data
        run: |
          set -e
          mkdir -p "$PLANKTON_DIR" "$NEKTON_DIR"
          jq -c '.participants[]' participants.json | while read -r p; do
            name=$(echo "$p" | jq -r .name)
            repo=$(echo "$p" | jq -r .repo)
            echo "::group::mirror $name ($repo)"
            rm -rf /tmp/part
            if git clone --depth 1 "$repo" /tmp/part 2>/dev/null; then
              [ -d /tmp/part/plankton-data ] && kton mirror plankton /tmp/part/plankton-data || echo "  (no plankton-data)"
              [ -d /tmp/part/nekton-data ]   && kton mirror nekton   /tmp/part/nekton-data   || echo "  (no nekton-data)"
            else
              echo "  clone failed — skipping"
            fi
            echo "::endgroup::"
          done

      - name: Regenerate STATUS.md (who has done what)
        run: python3 scripts/status.py federation participants.json > STATUS.md

      - name: Commit the union + status
        run: |
          git config user.name "plankton-aggregator"
          git config user.email "aggregator@users.noreply.github.com"
          git add federation STATUS.md
          if git diff --cached --quiet; then
            echo "no changes to aggregate"
          else
            git commit -m "aggregate: $(date -u +%FT%TZ)"
            git push
          fi
